<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="pentagonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#88C0D0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#81A1C1;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowGradient">
      <stop offset="0%" style="stop-color:#88C0D0;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#88C0D0;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Glow effect -->
  <circle cx="100" cy="100" r="95" fill="url(#glowGradient)" />
  
  <!-- Pentagon shape -->
  <polygon points="100,10 190,70 155,190 45,190 10,70" 
           fill="url(#pentagonGradient)" 
           stroke="#2E3440" 
           stroke-width="3"/>
  
  <!-- Inner pentagon (lighter) -->
  <polygon points="100,30 175,75 150,175 50,175 25,75" 
           fill="none"
           stroke="#ECEFF4" 
           stroke-width="2"
           opacity="0.6"/>
  
  <!-- Center icon: Chat bubble with motor icon -->
  <g>
    <!-- Chat bubble background -->
    <circle cx="100" cy="90" r="35" fill="#2E3440" stroke="#ECEFF4" stroke-width="2"/>
    
    <!-- Chat bubble tail -->
    <polygon points="85,125 75,140 95,130" fill="#2E3440"/>
    
    <!-- Motor bike icon inside (simplified) -->
    <g transform="translate(100, 90)">
      <!-- Wheels -->
      <circle cx="-8" cy="8" r="4" fill="none" stroke="#ECEFF4" stroke-width="1.5"/>
      <circle cx="8" cy="8" r="4" fill="none" stroke="#ECEFF4" stroke-width="1.5"/>
      
      <!-- Body -->
      <path d="M -5 5 L 5 5 L 6 0 L -6 0 Z" fill="#ECEFF4" opacity="0.8"/>
      
      <!-- Seat -->
      <rect x="-2" y="0" width="4" height="2" fill="#ECEFF4"/>
    </g>
  </g>
  
  <!-- Text: PENTAMO -->
  <text x="100" y="190" font-family="Arial, sans-serif" font-size="14" font-weight="bold" 
        text-anchor="middle" fill="#ECEFF4">PentaMo</text>
</svg>
